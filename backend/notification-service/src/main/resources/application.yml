server:
  port: 8085

spring:
  application:
    name: notification-service

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/library_db}
    username: ${DB_USERNAME:library_user}
    password: ${DB_PASSWORD:library_pass}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: notification-group
      auto-offset-reset: earliest
      enable-auto-commit: true
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.library.*"
        spring.json.use.type.headers: false

twilio:
  account-sid:   ${TWILIO_ACCOUNT_SID:}
  auth-token:    ${TWILIO_AUTH_TOKEN:}
  whatsapp-from: ${TWILIO_WHATSAPP_FROM:whatsapp:+14155238886}

sendgrid:
  api-key: ${SENDGRID_API_KEY:}

notification:
  from-email:     ${FROM_EMAIL:noreply@targetzone.co.in}
  from-name:      ${FROM_NAME:Target Zone Library}
  admin-email:    ${ADMIN_EMAIL:admin@targetzone.co.in}
  admin-whatsapp: ${ADMIN_WHATSAPP:}

management:
  endpoints:
    web:
      exposure:
        include: health,info