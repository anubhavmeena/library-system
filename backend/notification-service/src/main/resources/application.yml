server:
  port: 8085

spring:
  application:
    name: notification-service

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/library_db}
    username: ${DB_USERNAME:library_user}
    password: ${DB_PASSWORD:library_pass}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  mail:
    host: ${SMTP_HOST:localhost}
    port: ${SMTP_PORT:25}
    properties:
      mail.smtp.auth: false
      mail.smtp.starttls.enable: false
      mail.smtp.connectiontimeout: 5000
      mail.smtp.timeout: 5000
      mail.smtp.writetimeout: 5000

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

app:
  user-service:
    base-url: ${USER_SERVICE_URL:http://localhost:8082}
  frontend-url: ${FRONTEND_URL:https://targetzone.co.in}

meta:
  whatsapp:
    token:           ${META_WHATSAPP_TOKEN:}
    phone-number-id: ${META_WHATSAPP_PHONE_NUMBER_ID:}
    api-version:     ${META_WHATSAPP_API_VERSION:v21.0}
    template-name:   ${META_NOTIFICATION_TEMPLATE_NAME:library_notification}
    language:        ${META_WHATSAPP_LANGUAGE:en_US}

twilio:
  account-sid:   ${TWILIO_ACCOUNT_SID:}
  auth-token:    ${TWILIO_AUTH_TOKEN:}
  whatsapp-from: ${TWILIO_WHATSAPP_FROM:whatsapp:+14155238886}

sendgrid:
  api-key: ${SENDGRID_API_KEY:}

notification:
  from-email:     ${FROM_EMAIL:noreply@targetzone.co.in}
  from-name:      ${FROM_NAME:Target Zone Library}
  admin-email:    ${ADMIN_EMAIL:admin@targetzone.co.in}
  admin-whatsapp: ${ADMIN_WHATSAPP:}

management:
  endpoints:
    web:
      exposure:
        include: health,info