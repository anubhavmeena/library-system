server:
  port: 8086

spring:
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/library_db}
    username: ${DB_USERNAME:library_user}
    password: ${DB_PASSWORD:library_pass}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
  mail:
    host: ${SMTP_HOST:localhost}
    port: ${SMTP_PORT:25}
    test-connection: false
    properties:
      mail.smtp.auth: false
      mail.smtp.starttls.enable: false
      mail.smtp.connectiontimeout: 5000
      mail.smtp.timeout: 5000

admin:
  inbox:
    imap-host:  ${IMAP_HOST:localhost}
    imap-port:  ${IMAP_PORT:143}
    username:   ${ADMIN_IMAP_USER:admin}
    password:   ${ADMIN_IMAP_PASS:}
    use-ssl:    ${IMAP_SSL:false}
    from-email: ${ADMIN_EMAIL:admin@targetzone.co.in}

app:
  reminder:
    days-before: 7
