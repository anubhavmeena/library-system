server:
  port: 8082

spring:
  application:
    name: user-service
  servlet:
    multipart:
      max-file-size: 6MB
      max-request-size: 6MB
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/library_db}
    username: ${DB_USERNAME:library_user}
    password: ${DB_PASSWORD:library_pass}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

app:
  upload:
    dir: ${UPLOAD_DIR:/app/uploads}
    max-size: 5242880   # 5 MB
    allowed-types: image/jpeg,image/png,image/webp

management:
  endpoints:
    web:
      exposure:
        include: health,info