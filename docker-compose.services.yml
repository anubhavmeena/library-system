# =====================================================================
# Target Zone Library — Application Microservices + Frontend
# Requires infrastructure to be running first:
#   docker-compose -f docker-compose.infra.yml up -d
#
# Usage:
#   docker-compose -f docker-compose.services.yml up -d
#   docker-compose -f docker-compose.services.yml up -d --build   # rebuild images
#   docker-compose -f docker-compose.services.yml logs -f          # tail all logs
#   docker-compose -f docker-compose.services.yml logs -f auth-service
#   docker-compose -f docker-compose.services.yml down
#
# Env vars: copy .env.example to .env and fill in real credentials
# =====================================================================

version: '3.8'

networks:
  library-network:
    external: true
    name: library-network

volumes:
  uploads-data:
    name: library-uploads-data

# ── Shared logging anchor ──────────────────────────────────────────────────
x-logging: &default-logging
  logging:
    driver: "json-file"
    options:
      max-size: "50m"
      max-file: "3"

# ── Shared environment anchors ─────────────────────────────────────────────
x-db-env: &db-env
  DB_URL:        jdbc:postgresql://postgres:5432/library_db
  DB_USERNAME:   library_user
  DB_PASSWORD:   library_pass

x-kafka-env: &kafka-env
  KAFKA_BOOTSTRAP_SERVERS: kafka:29092

x-spring-env: &spring-env
  SPRING_PROFILES_ACTIVE: prod

x-jvm-heavy: &jvm-heavy
  JAVA_TOOL_OPTIONS: >-
    -Xms96m -Xmx256m -XX:+UseG1GC -XX:MaxGCPauseMillis=200
    -XX:MaxMetaspaceSize=96m -XX:ReservedCodeCacheSize=48m
    -Xss256k -XX:+ExitOnOutOfMemoryError

x-jvm-medium: &jvm-medium
  JAVA_TOOL_OPTIONS: >-
    -Xms64m -Xmx192m -XX:+UseSerialGC
    -XX:MaxMetaspaceSize=96m -XX:ReservedCodeCacheSize=48m
    -Xss256k -XX:+ExitOnOutOfMemoryError

x-jvm-light: &jvm-light
  JAVA_TOOL_OPTIONS: >-
    -Xms48m -Xmx128m -XX:+UseSerialGC
    -XX:MaxMetaspaceSize=96m -XX:ReservedCodeCacheSize=48m
    -Xss256k -XX:+ExitOnOutOfMemoryError

services:

  # ─────────────────────────────────────────────────────────────────────
  # API Gateway  —  port 8080
  # Single entry point for all client traffic.
  # Validates JWT, injects X-User-Id / X-User-Role headers,
  # then proxies to the appropriate downstream service.
  # ─────────────────────────────────────────────────────────────────────
  api-gateway:
    build:
      context: ./backend
      dockerfile: api-gateway/Dockerfile
    image: target-zone/api-gateway:latest
    container_name: library-api-gateway
    restart: unless-stopped
    <<: *default-logging
    mem_limit: 512m
    ports:
      - "8080:8080"
    environment:
      <<: [*spring-env, *jvm-heavy]
      AUTH_SERVICE_URL:         http://auth-service:8081
      USER_SERVICE_URL:         http://user-service:8082
      MEMBERSHIP_SERVICE_URL:   http://membership-service:8083
      SEAT_SERVICE_URL:         http://seat-service:8084
      NOTIFICATION_SERVICE_URL: http://notification-service:8085
      ADMIN_SERVICE_URL:        http://admin-service:8086
      JWT_SECRET: ${JWT_SECRET:-library-jwt-secret-key-2024-change-in-production}
    networks:
      - library-network
    depends_on:
      - auth-service
      - user-service
      - membership-service
      - seat-service
      - notification-service
      - admin-service
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ─────────────────────────────────────────────────────────────────────
  # Auth Service  —  port 8081
  # OTP generation (apitxt SMS → Twilio fallback), OTP verification (Redis),
  # JWT issuance, user registration.
  # ─────────────────────────────────────────────────────────────────────
  auth-service:
    build:
      context: ./backend
      dockerfile: auth-service/Dockerfile
    image: target-zone/auth-service:latest
    container_name: library-auth-service
    restart: unless-stopped
    <<: *default-logging
    mem_limit: 450m
    ports:
      - "8081:8081"
    environment:
      <<: [*spring-env, *db-env, *jvm-medium]
      REDIS_HOST:          redis
      REDIS_PORT:          6379
      JWT_SECRET:          ${JWT_SECRET:-library-jwt-secret-key-2024-change-in-production}
      APITXT_AUTH_KEY:              ${APITXT_AUTH_KEY:-}
      META_WHATSAPP_TOKEN:          ${META_WHATSAPP_TOKEN:-}
      META_WHATSAPP_PHONE_NUMBER_ID: ${META_WHATSAPP_PHONE_NUMBER_ID:-}
      META_WHATSAPP_TEMPLATE_NAME:  ${META_WHATSAPP_TEMPLATE_NAME:-library_otp}
      TWILIO_ACCOUNT_SID:           ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN:            ${TWILIO_AUTH_TOKEN:-}
      TWILIO_PHONE_NUMBER:          ${TWILIO_PHONE_NUMBER:-}
      ADMIN_PHONES:                 ${ADMIN_PHONES:-}
    networks:
      - library-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

  # ─────────────────────────────────────────────────────────────────────
  # User Service  —  port 8082
  # Profile management: GET/PATCH own profile, photo upload/delete.
  # Serves uploaded photos as static files from /app/uploads.
  # ─────────────────────────────────────────────────────────────────────
  user-service:
    build:
      context: ./backend
      dockerfile: user-service/Dockerfile
    image: target-zone/user-service:latest
    container_name: library-user-service
    restart: unless-stopped
    <<: *default-logging
    mem_limit: 450m
    ports:
      - "8082:8082"
    environment:
      <<: [*spring-env, *db-env, *jvm-medium]
      UPLOAD_DIR: /app/uploads
    volumes:
      - uploads-data:/app/uploads
    networks:
      - library-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8082/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

  # ─────────────────────────────────────────────────────────────────────
  # Membership Service  —  port 8083
  # Membership plans, Razorpay order creation, payment verification,
  # Kafka producer → publishes booking-confirmed events.
  # ─────────────────────────────────────────────────────────────────────
  membership-service:
    build:
      context: ./backend
      dockerfile: membership-service/Dockerfile
    image: target-zone/membership-service:latest
    container_name: library-membership-service
    restart: unless-stopped
    <<: *default-logging
    mem_limit: 512m
    ports:
      - "8083:8083"
    environment:
      <<: [*spring-env, *db-env, *kafka-env, *jvm-heavy]
      RAZORPAY_KEY_ID:     ${RAZORPAY_KEY_ID:-}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-}
      USER_SERVICE_URL:    http://user-service:8082
    networks:
      - library-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8083/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

  # ─────────────────────────────────────────────────────────────────────
  # Seat Service  —  port 8084
  # Seat availability (Redis cached), seat booking with conflict detection,
  # seat release. Used by both students (booking page) and admin (seat map).
  # ─────────────────────────────────────────────────────────────────────
  seat-service:
    build:
      context: ./backend
      dockerfile: seat-service/Dockerfile
    image: target-zone/seat-service:latest
    container_name: library-seat-service
    restart: unless-stopped
    <<: *default-logging
    mem_limit: 450m
    ports:
      - "8084:8084"
    environment:
      <<: [*spring-env, *db-env, *jvm-medium]
      REDIS_HOST: redis
      REDIS_PORT: 6379
    networks:
      - library-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8084/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

  # ─────────────────────────────────────────────────────────────────────
  # Notification Service  —  port 8085
  # Kafka consumer for three topics:
  #   booking-confirmed → WhatsApp + email to student + admin alert
  #   user-registered   → welcome message to student
  #   renewal-reminder  → expiry warning to student
  # Uses Twilio (WhatsApp) and SendGrid (email).
  # ─────────────────────────────────────────────────────────────────────
  notification-service:
    build:
      context: ./backend
      dockerfile: notification-service/Dockerfile
    image: target-zone/notification-service:latest
    container_name: library-notification-service
    restart: unless-stopped
    <<: *default-logging
    mem_limit: 384m
    ports:
      - "8085:8085"
    environment:
      <<: [*spring-env, *db-env, *kafka-env, *jvm-light]
      TWILIO_ACCOUNT_SID:   ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN:    ${TWILIO_AUTH_TOKEN:-}
      TWILIO_WHATSAPP_FROM: ${TWILIO_WHATSAPP_FROM:-whatsapp:+14155238886}
      SENDGRID_API_KEY:     ${SENDGRID_API_KEY:-}
      FROM_EMAIL:           ${FROM_EMAIL:-noreply@targetzone.co.in}
      FROM_NAME:            ${FROM_NAME:-Target Zone Library}
      ADMIN_EMAIL:          ${ADMIN_EMAIL:-admin@targetzone.co.in}
      ADMIN_WHATSAPP:       ${ADMIN_WHATSAPP:-}
    networks:
      - library-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8085/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

  # ─────────────────────────────────────────────────────────────────────
  # Admin Service  —  port 8086
  # Admin dashboard stats, student management, seat occupancy map,
  # revenue reports, manual reminder sending, and the daily 9AM scheduler
  # that automatically queues expiry reminders via Kafka.
  # ─────────────────────────────────────────────────────────────────────
  admin-service:
    build:
      context: ./backend
      dockerfile: admin-service/Dockerfile
    image: target-zone/admin-service:latest
    container_name: library-admin-service
    restart: unless-stopped
    <<: *default-logging
    mem_limit: 384m
    ports:
      - "8086:8086"
    environment:
      <<: [*spring-env, *db-env, *kafka-env, *jvm-light]
    networks:
      - library-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8086/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

  # ─────────────────────────────────────────────────────────────────────
  # Frontend  —  port 3000
  # React 18 app built by Vite, served by Nginx.
  # Nginx proxies /api/* → api-gateway:8080
  # Nginx proxies /uploads/* → user-service:8082
  # ─────────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL:     ""        # empty = Nginx proxy handles /api routing
        VITE_RAZORPAY_KEY_ID:  ${RAZORPAY_KEY_ID:-}
    image: target-zone/frontend:latest
    container_name: library-frontend
    restart: unless-stopped
    <<: *default-logging
    ports:
      - "3000:80"
    networks:
      - library-network
    depends_on:
      api-gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
