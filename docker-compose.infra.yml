# =====================================================================
# Target Zone Library — Infrastructure Services
# Starts: PostgreSQL, Redis, Zookeeper, Kafka, Kafka UI
#
# Usage:
#   docker-compose -f docker-compose.infra.yml up -d
#   docker-compose -f docker-compose.infra.yml down
#   docker-compose -f docker-compose.infra.yml down -v   # also removes volumes
# =====================================================================

version: '3.8'

x-logging: &default-logging
  logging:
    driver: "json-file"
    options:
      max-size: "50m"
      max-file: "3"

networks:
  library-network:
    driver: bridge
    name: library-network

volumes:
  postgres-data:
    name: library-postgres-data
  redis-data:
    name: library-redis-data
  kafka-data:
    name: library-kafka-data
  zookeeper-data:
    name: library-zookeeper-data

services:

  # ─────────────────────────────────────────────────────────────────────
  # PostgreSQL 15
  # Connection: jdbc:postgresql://localhost:5432/library_db
  # Credentials: library_user / library_pass
  # On first container start (empty volume) PostgreSQL runs init scripts
  # in filename order: 01_schema.sql (DDL) then 02_seed.sql (data).
  # ─────────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: library-postgres
    restart: unless-stopped
    <<: *default-logging
    environment:
      POSTGRES_USER:     library_user
      POSTGRES_PASSWORD: library_pass
      POSTGRES_DB:       library_db
      PGDATA:            /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./backend/common-lib/src/main/resources/db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./backend/common-lib/src/main/resources/db/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql:ro
    networks:
      - library-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U library_user -d library_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ─────────────────────────────────────────────────────────────────────
  # Redis 7
  # Used by: auth-service (OTP cache, session tokens)
  #          seat-service (availability cache, 5-min TTL)
  # Connection: redis://localhost:6379
  # ─────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: library-redis
    restart: unless-stopped
    <<: *default-logging
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - library-network
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ─────────────────────────────────────────────────────────────────────
  # Zookeeper (required by Kafka)
  # ─────────────────────────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: library-zookeeper
    restart: unless-stopped
    <<: *default-logging
    mem_limit: 192m
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME:   2000
      ZOOKEEPER_LOG4J_ROOT_LOGLEVEL: WARN
      ZOOKEEPER_4LW_COMMANDS_WHITELIST: "srvr,ruok"
      ZOOKEEPER_HEAP_OPTS: "-Xms64m -Xmx128m"
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
    networks:
      - library-network
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo ruok > /dev/tcp/localhost/2181' && echo ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ─────────────────────────────────────────────────────────────────────
  # Apache Kafka
  # Topics auto-created on first publish:
  #   - booking-confirmed   (membership-service → notification-service)
  #   - user-registered     (auth-service → notification-service)
  #   - renewal-reminder    (admin-service → notification-service)
  #
  # Internal services connect via:  kafka:29092
  # Host machine connects via:      localhost:9092
  # ─────────────────────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: library-kafka
    restart: unless-stopped
    <<: *default-logging
    mem_limit: 640m
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_HEAP_OPTS: "-Xms256m -Xmx512m"
      KAFKA_BROKER_ID:                        1
      KAFKA_ZOOKEEPER_CONNECT:                zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP:   PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_LISTENERS:                        PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS:             PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME:       PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE:        'true'
      KAFKA_LOG_RETENTION_HOURS:              72
      KAFKA_LOG_RETENTION_BYTES:              536870912
      KAFKA_LOG_SEGMENT_BYTES:                104857600
      KAFKA_LOG_SEGMENT_MS:                   3600000
      KAFKA_LOG4J_ROOT_LOGLEVEL:              WARN
      KAFKA_LOG4J_LOGGERS:                    >-
        kafka.controller=WARN,
        kafka.producer.async.DefaultEventHandler=WARN,
        state.change.logger=WARN
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - library-network
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ─────────────────────────────────────────────────────────────────────
  # Kafka UI — browser-based Kafka topic monitor
  # Access: http://localhost:8090
  # View topics, consumer groups, messages in real-time
  # ─────────────────────────────────────────────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: library-kafka-ui
    restart: unless-stopped
    <<: *default-logging
    mem_limit: 384m
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME:             local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER:        zookeeper:2181
      JAVA_TOOL_OPTIONS: >-
        -Xms64m -Xmx256m -XX:+UseSerialGC
        -XX:MaxMetaspaceSize=96m -XX:ReservedCodeCacheSize=48m
        -Xss256k -XX:+ExitOnOutOfMemoryError
    networks:
      - library-network